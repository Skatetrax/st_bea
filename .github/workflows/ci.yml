name: CI — Validate Build

on:
  pull_request:
    branches: [dev, main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install skatetrax_core
        run: pip install git+https://github.com/Skatetrax/skatetrax_core.git@main#egg=skatetrax_core

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from app import app; print('App loads OK')"
        working-directory: app

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit || true
        continue-on-error: true

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: CORE_BRANCH=main
          tags: skatetrax_backend:ci-test
